apiVersion: v1
kind: Service
metadata:
  name: service-dmz
  namespace: pmguene-dev
spec:
  selector:
    app: serveur-web
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
    - name: nodejs
      port: 3000
      targetPort: 3000
